<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="shortcut icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <meta name="theme-color" content="#000000" />
    <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->
    <title>React App</title>
    <link rel="stylesheet" href="../assets/toolkit/styles/toolkit.css" />
    <script src="../assets/toolkit/scripts/jquery.min.js"></script>
    <script src="../assets/toolkit/scripts/toolkit.js"></script>
    <link rel="stylesheet" href="/assets/404Style.css" />
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <div id="modal">
      
                <div class="modal reveal" id="exampleModal2" data-reveal>
                  <h3 class="modal__title">Create New library</h3>
                  <div id="exampleModal2_loading" style="display: none;">
                    <center>
                      <img src="https://loading.io/spinners/rolling/lg.curve-bars-loading-indicator.gif" />
                      </center>
                  </div>
                  <div id="inside_exampleModal2">
                    <div>
                      <input id="libraryName" class="input" type="text" placeholder="Library name" />
                    </div>
                    <div class="text-right">
                      <button class="button" id="createLibraryButton">Create</button>
                    </div>
                  </div>
                  <button class="close-button" data-close aria-label="Close reveal" type="button">
                    <img src="../../assets/toolkit/images/006-error.svg" alt />
                  </button>
                </div>
                            
            <div class="modal reveal" id="editProfile" data-reveal>
              <div id="loadingProfile">
                <center style={this.props.style}>
                    <img src="/assets/toolkit/images/logo.svg" alt /><br/>
                    <img src="https://loading.io/spinners/rolling/lg.curve-bars-loading-indicator.gif" />
                </center>
              </div>

              <form id="edit_profile" style="display: none;">
                <h3 class="modal__title">Edit profile</h3>
                  <div class="modal__content">
                    <div class="modal__upload">
                      <img id="profile_image" class="modal__img" src="https://scontent.fprn1-1.fna.fbcdn.net/v/t1.0-1/p160x160/35988964_1041356179350456_5301902918050381824_n.jpg?_nc_cat=105&_nc_ht=scontent.fprn1-1.fna&oh=2142e132de1a494501a3fc90d51e365c&oe=5D4FB1D7" />
                      <input type="file" id="uploadPhotoInput" hidden>
                      <button type="button" id="uploadPhotoButton" class="button naked smaller">Upload photo</button>
                    </div>
                    <div class="modal__form">
                      <p class="bold">Personal</p>
                      <input class="input" id="p_full_name" type="text" placeholder="First and last name">
                      <div class="select__div">
                        <select id="p_job">
                        </select>
                      </div>
                    </div>
                    <div class="modal__form">
                      <p class="bold">Account</p>
                      <input class="input" id="p_email" type="email" placeholder="Email">
                      <input class="input" id="p_password" type="password" placeholder="New password">
                    </div>
                  </div>
                <div class="text-right">
                  <button class="button smaller">Update profile</button>
                </div>
                <button id="closeEditProfile" class="close-button" data-close aria-label="Close reveal" type="button">
                  <img src="../../assets/toolkit/images/006-error.svg" alt="">
                </button>
              </div>
            </form>


    </div>
      

    <!--
      This HTML file is a template.
      If you open it directly in the browser, you will see an empty page.

      You can add webfonts, meta tags, or analytics to this file.
      The build step will place the bundled scripts into the <body> tag.

      To begin the development, run `npm start` or `yarn start`.
      To create a production bundle, use `npm run build` or `yarn build`.
    -->
  </body>
</html>
