
enum Platform {
  IOS
  ANDROID
}

enum ORDER_BY {
  createdAt_ASC
  createdAt_DESC
}

enum AccountType {
  MEMBER
  ADMIN
}

enum LinkType {
  connect
  disconnect  
}

enum SUBSCRIPTION_STATUS {
  NULL
  incomplete
  incomplete_expired
  trialing
  active
  past_due
  canceled
  unpaid
}
type BasicInfo {
  success: Boolean!
}

type TokenValidation {
  valid: Boolean!
}

type AuthData {
  userId: ID!
  token: String!
  expiresIn: Int!
}

type File {
  id: ID!
  filename: String!
  mimetype: String!
  encoding: String!
  url: String!  
}

type Video {
  id: ID!
  file: File!
}

type Job {
  id: ID!
  name: String!
}

type Source {
  id: ID!
  last4: Int!
  exp_month: Int!
  exp_year: Int!
  brand: String!
}

type Customer {
  id: ID
  source: Source!
}

type _Subscription {
  id: ID!
  cancel_at_period_end: Boolean!
  status: SUBSCRIPTION_STATUS!
}

type Invoice {
  id: ID!
  status: String!
  last4: Int!
  paid: Boolean!
  total: Int!
  hosted_invoice_url: String!
}

type User {
  id: ID!
  email: String!
  password: String!
  full_name: String!
  google_accessToken: String
  facebook_accessToken: String
  job: Job
  role: AccountType!
  customer: Customer
  _subscription: _Subscription
  profile_photo: File
  apps: [App!]!
  libraries: [Library!]!
  invoices: [Invoice!]!
  pageViews: [PageView!]!
}

type AppVersion {
  id: ID!
  name: String! 
}

type AppCategory {
  id: ID!
  name: String!
}

type StoryCategory {
  id: ID!
  name: String!
}

type StoryElement {
  id: ID!
  name: String!
}

type App {
  id: ID!
  createdBy: User!
  appCategory: AppCategory!
  appVersions: [AppVersion!]!
  stories(first:Int): [Story!]!
  name: String!
  description: String
  company: String!
  logo: File!
  platform: Platform!
}

type Story {
  id: ID!
  app: App!
  appVersions: [AppVersion!]!
  storyCategories: [StoryCategory!]!
  storyElements: [StoryElement!]!
  libraries: [Library!]!
  video: Video!
  thumbnail: File!
}

type Library {
  id: ID!
  createdBy: User!
  stories: [Story!]!
  name: String!
}

input FileInputCreateWithBase64 {
  base64: String! 
  mimetype: String!
}

input FileInputCreateWithUrl {
  url: String!
}

input FileInput {
  createWithBase64: FileInputCreateWithBase64
  createWithUrl: FileInputCreateWithUrl 
}

input AppFilterInput {
  first: Int
  skip: Int
  appName_contains: String
  appCategory: String
  storyCategories: [ID!]
  storyElements: [ID!]
  orderBy: ORDER_BY
}

input LibraryFilterInput {
   containsStory: ID
   storyCategories: [String!]
   storyElements: [String!]
}


input StoryLinkType {
  story: ID!
  type: LinkType!
}

input StoriesFilterInput {
  first: Int
  skip: Int
  app: ID
  inLibrary: ID
  storyName_contains: String
  appCategory: ID
  storyCategories: [ID!]
  storyElements: [ID!]
  appVersions: [ID!]
  orderBy: ORDER_BY
}

input AppVersionLinkInput {
  appVersion: ID!
  type: LinkType!
}

input StoryCategoryLinkType {
  storyCategory: ID!
  type: LinkType!
}

input StoryElementLinkType {
  storyElement: ID!
  type: LinkType!
}

input UserFilterInput {
  first: Int
  skip: Int
  full_name_contains: String
}

type Aggregate {
  count: Int!
} 
type PageInfo {
  hasNextPage: Boolean!
  hasPreviousPage: Boolean!
}

type JSON_OBJECT {
  repr: String!
}

type ObjectConnection {
  id: ID!
  pageInfo: PageInfo!
  nodes: JSON_OBJECT!
  aggregate: Aggregate!
}

enum CONNECTION_TYPE {
  usersConnection
  appsConnection
  storiesConnection
  appCategoriesConnection
  storyCategoriesConnection
  storyElementsConnection
  jobsConnection
}

enum DELETE_TYPE {
  deleteUser
  deleteApp
  deleteStory
  deleteAppCategory 
  deleteStoryCategory
  deleteStoryElement
  deleteJob
}

input Dict {
  key: String
  value_str: String
  value_int: Int
}

input JSON_OBJECT_Input {
  repr: String!
}

enum QUERY_TYPE {
  user
  app
  story
  appCategory
  storyCategory
  storyElement
  job
}

enum MUTATION_TYPE {
  createUser
  createApp
  createAppCategory
  createAppVersion
  createStory
  createStoryCategory
  createStoryElement
  createJob

  updateUser
  updateApp
  updateAppCategory
  updateAppVersion
  updateStory
  updateStoryCategory
  updateStoryElement
  updateJob
}
type ToggleStoryInfo {
  action: LinkType!
  library: Library!
}

type MemoryUsage {
  freeMemory: Float!
  totalMemory: Float!
}

type MemwatchLeak {
  start: String
  end: String
  growth: Float
  reason: String
}

type MemwatchStats {
  num_full_gc: Float
  num_inc_gc: Float
  heap_compactions: Float
  estimated_base: Float
  current_base: Float
  min: Float
  max: Float
  usage_trend: Float
}

type CPU_INFO_TIMES {
  user: Int!
  nice: Int!
  sys: Int!
  idle: Int!
  irq: Int!
}

type CPU_INFO {
  core: Int!
  model: String!
  speed: Int!
  times: CPU_INFO_TIMES!
  percent: Float!
}

type PageView {
  id: ID!
  user: User!
  pathname: String!
  agent: String!
  createdAt: String!
  updatedAt: String!
}

type Subscription {
  getMemwatchStats: MemwatchStats!
  getMemwatchLeak: MemwatchLeak! 
  getMemoryUsage: MemoryUsage!
  getSystemCpuUsage: CPU_INFO!
}


type Query {
  getLoggedInUser: User
  app(id: ID,stories_first: Int,contains_story: ID): App
  apps(appFilterInput: AppFilterInput): [App!]!
  appVersions(
    app: ID
  ): [AppVersion!]!
  appCategories: [AppCategory!]!

  pageViews(
    user: ID
    pathname: String
  ): [PageView!]!

  getObject(
    id: ID!
    query_type: QUERY_TYPE!
    fields: [String!]!
  ): JSON_OBJECT!

  getObjectConnection(
    connection_type: CONNECTION_TYPE!
    fields: [String!]!
    filterBy: [Dict!]
    where: [Dict!]
  ): ObjectConnection! 

  story(
    id: ID!
  ): Story
  stories(
    storiesFilterInput: StoriesFilterInput  
  ): [Story!]!
  storyCategories(
    app: ID
    library: ID
  ): [StoryCategory!]!

  storyElements(
    app: ID
    library: ID
  ): [StoryElement!]!

  library(
    id: ID!
  ): Library

  libraries(
    libraryFilterInput: LibraryFilterInput
  ): [Library!]!

  jobs: [Job!]!
  users(userFilterInput: UserFilterInput): [User!]!
  countApps: Int!
  countStories: Int!
  countUsers: Int!
}
type Mutation {
  saveToLibrary(
    story_id: ID!
    library_id: ID!
  ): Library!

  loginWithGoogle(
    google_accessToken: String!
  ): AuthData!

  loginWithFacebook(
    facebook_accessToken: String!
  ): AuthData!
  
  updateCard(stripe_token: String!): Source!
  cancelSubscription: _Subscription!
  renewSubscription: _Subscription!
  payment(
    stripe_token: String!
  ): _Subscription!

  updateAlgoliaIndex(
    indexName: String!
    object_id: ID!
  ): BasicInfo!

  addAlgoliaIndex(
    indexName: String!
    object_id: ID!
  ): BasicInfo!

  deleteAlgoliaIndex(
    indexName: String!
    object_id: ID!
  ): BasicInfo!

  createObject(
    data: JSON_OBJECT_Input!
    fields: [String!]
    mutation_type: MUTATION_TYPE!
    fields_info: JSON_OBJECT_Input!
  ): JSON_OBJECT!

  updateObject(
    id: ID!
    data: JSON_OBJECT_Input!
    fields: [String!]
    mutation_type: MUTATION_TYPE!
    fields_info: JSON_OBJECT_Input!
  ): JSON_OBJECT!

  toggleStoryLibrary(
    library: ID!
    story: ID!
  ): ToggleStoryInfo

  deleteObject(
    delete_type: DELETE_TYPE!
    fields: [String!]
    id: ID!
  ): JSON_OBJECT!

  login(
    email: String!
    password: String!
  ): AuthData!
  
  signUp(
    full_name: String!
    email: String!
    password: String!
    job: ID
    profile_photo: FileInput
    google_accessToken: String
    oauth_id: String
    facebook_accessToken: String
  ): AuthData!

  verifyForgotPassword(
    token: String!
  ): TokenValidation!

  resetPassword(
    token: String!
    new_password: String!
    repeat_new_password: String!
  ): BasicInfo!

  forgetPassword(
    email: String!
  ): BasicInfo!

  editProfile(
    full_name: String
    job: ID
    email: String
    password: String
    profile_photo: FileInput
  ): User!

  createApp(
    id: ID
    name: String!
    description: String!
    platform: Platform!
    logo: FileInput!
    appVersion: String!
    appCategory: String!
    company: String!
  ): App!

  createPageView(
    user: ID
    pathname: String!
    agent: String!
  ): PageView

  editApp(
    id: ID!
    name: String
    description: String
    platform: Platform
    logo: FileInput
    appVersions: [AppVersionLinkInput!]
    appCategory: ID
    company: String
    ): App!

  createAppCategory(
    name: String!
  ): AppCategory!

  editAppCategory(
    id: ID!
    name: String!
  ): AppCategory!

  deleteAppCategory(
    id: ID!
  ): AppCategory!

  createAppVersion(
    name: String!
  ): AppVersion!

  appVersionToApp(
    app: ID!
    appVersion: ID!
    type: LinkType!
  ): App!

  appVersionToStory(
    story: ID!
    appVersion: ID!
    type: LinkType!
  ): Story!

  editAppVersion(
    id: ID!
    name: String!
  ): AppVersion

  deleteAppVersion(
    id: ID!
  ): AppVersion!

  uploadFile(
    file: FileInput!
  ): File!

  createLibrary(
    name: String!
  ): Library!


  editLibrary(
    id: ID!
    name: String
    stories: [StoryLinkType!]
  ): Library!

  deleteLibrary(
    id: ID!
  ): Library!

  createStory(
    app: ID!
    video: FileInput!
    thumbnail: FileInput
    appVersions: [ID!]!
    storyCategories: [ID!]!
    storyElements: [ID!]!
  ): Story!

  editStory(
    id: ID!
    app: ID
    video: FileInput
    thumbnail: FileInput
    appVersions: [AppVersionLinkInput!]
    storyCategories: [StoryCategoryLinkType!]
    storyElements: [StoryElementLinkType!]
  ): Story!

  storyToLibrary(
    story: ID!
    library: ID!
    type: LinkType!
  ): Library!

  storyToApp(
    story: ID!
    app: ID!
    type: LinkType!
  ): App!

  createStoryCategory(
    name: String!
  ): StoryCategory!

  storyCategoryToStory(
    storyCategory: ID!
    story: ID!  
    type: LinkType!
  ): Story!

  editStoryCategory(
    id: ID!
    name: String!
  ): StoryCategory!

  deleteStoryCategory(
    id: ID!
  ): StoryCategory!

  createStoryElement(
    name: String!
  ): StoryElement!

  storyElementToStory(
    story: ID!
    storyElement: ID! 
    type: LinkType!  
  ): Story!

  editStoryElement(
    id: ID!
    name: String!
  ): StoryElement!

  deleteStoryElement(
    id: ID!
  ): StoryElement!

  createJob(
    name: String!
  ): Job!

  editJob(
    id: ID!
    name: String!
  ): Job!

  deleteJob(
    id: ID!
  ): Job!

}